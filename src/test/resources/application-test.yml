server:
  port: 8080

hentselv:
  client:
    address: http://localhost:8080/services/HentSelvSendDataService
    wsdl-location: classpath:api/HentSelvSendDataService.wsdl
    ws-security:
      keystore:
        location: classpath:cert/client-keystore.p12
        type: PKCS12
        password: changeit
        alias: client
      truststore:
        location: classpath:cert/client-truststore.p12
        type: PKCS12
        password: changeit
        alias: server-cert
  service:
    wsdl-location: classpath:api/HentSelvSendDataService.wsdl
    ws-security:
      keystore:
        location: classpath:cert/server-keystore.p12
        type: PKCS12
        password: changeit
        alias: server
      truststore:
        location: classpath:cert/server-truststore.p12
        type: PKCS12
        password: changeit
        alias: client-cert

logging:
  level:
    org.apache.cxf.services: INFO
    org.apache.cxf.ext.logging: INFO